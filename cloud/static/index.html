<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b1020">
<link rel="manifest" href="/manifest.webmanifest">
<title>ImageGen</title>
<style>
  :root { --bg:#0b1020; --card:#161c2e; --fg:#e8ecf6; --mut:#8a94ad; --acc:#6aa6ff; --line:#27304a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; background:var(--bg); color:var(--fg); font:16px/1.45 -apple-system,system-ui,"Noto Sans TC",sans-serif;
         padding:env(safe-area-inset-top) 14px calc(env(safe-area-inset-bottom) + 14px); }
  h1 { font-size:18px; margin:14px 2px 12px; }
  h1 span { color:var(--mut); font-weight:400; font-size:13px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px; }
  label { display:block; font-size:13px; color:var(--mut); margin:10px 0 4px; }
  textarea, select, input[type=text] { width:100%; background:#0e1422; color:var(--fg); border:1px solid var(--line);
         border-radius:10px; padding:11px; font-size:16px; }
  textarea { min-height:84px; resize:vertical; }
  .row { display:flex; gap:8px; } .row > div { flex:1; }
  .chk { display:flex; align-items:center; gap:8px; margin-top:12px; color:var(--fg); font-size:14px; }
  .chk input { width:20px; height:20px; }
  button { width:100%; margin-top:14px; background:var(--acc); color:#04122e; border:0; border-radius:12px;
           padding:14px; font-size:17px; font-weight:600; }
  button:disabled { opacity:.5; }
  #thumbs { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  #thumbs img { width:64px; height:64px; object-fit:cover; border-radius:8px; border:1px solid var(--line); }
  #status { color:var(--mut); font-size:14px; min-height:20px; margin-top:8px; }
  #prompt { white-space:pre-wrap; font-size:13px; color:var(--mut); background:#0e1422; border:1px solid var(--line);
            border-radius:10px; padding:10px; margin-top:8px; display:none; }
  #result { width:100%; border-radius:12px; margin-top:10px; display:none; }
  #actions { display:none; gap:8px; margin-top:10px; }
  #actions.show { display:flex; }
  #actions a, #actions button { flex:1; margin:0; width:auto; text-align:center; text-decoration:none;
    background:#1b2336; color:var(--fg); border:1px solid var(--line); border-radius:12px;
    padding:13px; font-size:16px; font-weight:600; }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid var(--mut); border-top-color:var(--acc);
          border-radius:50%; animation:s .8s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes s { to { transform:rotate(360deg); } }
  #bar { height:6px; border-radius:6px; background:#0e1422; border:1px solid var(--line);
         overflow:hidden; margin-top:10px; display:none; }
  #bar::before { content:''; display:block; height:100%; width:38%; background:var(--acc);
         border-radius:6px; animation:slide 1.15s ease-in-out infinite; }
  @keyframes slide { 0% { transform:translateX(-110%); } 100% { transform:translateX(300%); } }
</style>
</head>
<body>
  <h1>🎨 ImageGen <span>· apipass gpt-image-2</span></h1>

  <div class="card">
    <label>想生什麼？（用中文/口語描述意圖即可，Claude 會幫你寫 prompt）</label>
    <textarea id="intent" placeholder="例：黃昏的台北101復古旅遊海報，標題寫 TAIPEI"></textarea>

    <label>參考圖（選填，最多 5 張 · 鎖風格/角色）</label>
    <input id="files" type="file" accept="image/*" multiple>
    <div id="thumbs"></div>

    <div class="row">
      <div>
        <label>模型</label>
        <select id="model">
          <option value="openai/gpt-image-2">gpt-image-2</option>
          <option value="google/nano-banana-pro">nano-banana-pro</option>
        </select>
      </div>
      <div>
        <label>比例</label>
        <select id="aspect">
          <option>1:1</option><option>16:9</option><option>9:16</option><option>4:3</option><option>3:4</option>
        </select>
      </div>
      <div>
        <label>解析度</label>
        <select id="resolution">
          <option value="">預設</option><option>1K</option><option>2K</option><option>4K</option>
        </select>
      </div>
    </div>

    <label class="chk"><input id="writep" type="checkbox" checked> 讓 Claude 幫我寫 prompt（取消＝直接用上面文字）</label>

    <label>寫 prompt 的模型（丟參考圖時 Haiku 會自動升 Sonnet）</label>
    <select id="pmodel">
      <option value="haiku">Haiku · 最省額度</option>
      <option value="sonnet" selected>Sonnet · 推薦（品質≈Opus）</option>
      <option value="opus">Opus · 最強最細（燒額度快）</option>
    </select>

    <button id="go">生成</button>
    <div id="bar"></div>
    <div id="status"></div>
    <div id="prompt"></div>
    <img id="result" alt="result">
    <div id="actions">
      <a id="dl">📥 下載原檔</a>
      <button id="share">🔗 分享／存相簿</button>
    </div>
  </div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
const $ = id => document.getElementById(id);
const thumbs = $('thumbs');
$('files').addEventListener('change', () => {
  thumbs.innerHTML = '';
  [...$('files').files].slice(0,5).forEach(f => {
    const img = document.createElement('img'); img.src = URL.createObjectURL(f); thumbs.appendChild(img);
  });
});
$('writep').addEventListener('change', () => { $('pmodel').disabled = !$('writep').checked; });

let lastImg = '';
$('share').addEventListener('click', async () => {
  if (!lastImg) return;
  try {
    const blob = await (await fetch(lastImg)).blob();
    const file = new File([blob], 'imagegen.png', { type: blob.type || 'image/png' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'ImageGen' });
    } else { $('dl').click(); }   // 不支援分享 → 退回下載
  } catch (e) { /* 使用者取消或不支援，忽略 */ }
});
$('go').addEventListener('click', async () => {
  const intent = $('intent').value.trim();
  if (!intent) { $('status').textContent = '⚠️ 先輸入想生什麼'; return; }
  const fd = new FormData();
  fd.append('intent', intent);
  fd.append('model', $('model').value);
  fd.append('aspect', $('aspect').value);
  fd.append('resolution', $('resolution').value);
  fd.append('write_prompt', $('writep').checked ? 'true' : 'false');
  fd.append('prompt_model', $('pmodel').value);
  [...$('files').files].slice(0,5).forEach(f => fd.append('refs', f));

  $('go').disabled = true; $('result').style.display='none'; $('prompt').style.display='none';
  $('bar').style.display='block'; $('actions').classList.remove('show');
  const post = () => fetch('/generate', { method:'POST', body:fd,
    headers: { 'X-App-Token': localStorage.getItem('app_token') || '' } });

  // 跳動的階段訊息 + 秒數（就算串流被緩衝，計時器照跳，不會像當機）
  const t0 = Date.now();
  let stageMsg = $('writep').checked ? '✍️ Claude 正在寫 prompt…' : '🎨 生圖中…';
  const render = () => { $('status').innerHTML =
    '<span class="spin"></span>' + stageMsg + '（已 ' + Math.round((Date.now()-t0)/1000) + ' 秒）'; };
  const timer = setInterval(render, 500); render();
  const stop = () => { clearInterval(timer); $('bar').style.display='none'; };

  const onEvent = (ev) => {
    if (ev.stage === 'prompt') {
      if (ev.prompt) { $('prompt').textContent = '📝 ' + ev.prompt; $('prompt').style.display='block'; }
      stageMsg = '🎨 生圖中…（apipass，通常還要 20–50 秒）';
    } else if (ev.stage === 'generating') {
      stageMsg = '🎨 生圖中…（apipass，通常還要 20–50 秒）';
    } else if (ev.stage === 'progress') {
      stageMsg = '🎨 生圖中…（apipass 處理中，伺服器已等 ' + (ev.waited || 0) + ' 秒）';
    } else if (ev.stage === 'done') {
      stop();
      $('status').textContent = '✅ 完成（用了 ' + Math.round((Date.now()-t0)/1000) + ' 秒）';
      lastImg = ev.image_url;
      $('result').src = ev.image_url + '?t=' + Date.now(); $('result').style.display='block';
      $('dl').href = ev.image_url; $('dl').setAttribute('download', 'imagegen_' + Date.now() + '.png');
      $('actions').classList.add('show');
    } else if (ev.stage === 'error') {
      stop();
      $('status').textContent = '❌ ' + (ev.error || '失敗') + (ev.where ? ' ('+ev.where+')' : '');
    }
  };

  try {
    let r = await post();
    if (r.status === 401) {                       // 後端有設 APP_TOKEN（公開路線）
      const t = prompt('需要存取 token：'); if (t) { localStorage.setItem('app_token', t); r = await post(); }
    }
    if (r.status === 401) { stop(); $('status').textContent = '❌ token 不正確'; return; }
    if (!r.ok || !r.body) { stop(); $('status').textContent = '❌ HTTP ' + r.status; return; }
    // 讀 NDJSON 串流：每行一個事件
    const reader = r.body.getReader(); const dec = new TextDecoder(); let buf = '';
    for (;;) {
      const { value, done } = await reader.read(); if (done) break;
      buf += dec.decode(value, { stream:true });
      let nl; while ((nl = buf.indexOf('\n')) >= 0) {
        const line = buf.slice(0, nl).trim(); buf = buf.slice(nl + 1);
        if (line) { try { onEvent(JSON.parse(line)); } catch (_) {} }
      }
    }
    if (buf.trim()) { try { onEvent(JSON.parse(buf.trim())); } catch (_) {} }
  } catch (e) {
    stop(); $('status').textContent = '❌ 連線失敗：' + e.message;
  } finally { $('go').disabled = false; }
});
</script>
</body>
</html>
